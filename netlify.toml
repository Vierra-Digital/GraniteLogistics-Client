# Netlify deploy config — Granite Logistics PWA + Netlify Blobs-backed Functions.
# Static frontend (no build step) plus serverless functions under /api/*.
[build]
  publish = "."
  command = ""

[build.environment]
  # Functions don't use Puppeteer; don't fetch Chromium during install.
  PUPPETEER_SKIP_DOWNLOAD = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Revalidate the service worker on every load so updates ship promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Correct MIME type for the PWA manifest.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
